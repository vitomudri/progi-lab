name: Docker build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kuhari:latest
            ${{ github.ref_type == 'tag' && format('ghcr.io/{0}/kuhari:{1}', github.repository_owner, github.ref_name) || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kuhari:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kuhari:cache,mode=max
