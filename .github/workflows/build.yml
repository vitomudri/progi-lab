name: Docker build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image (main)
        if: github.ref_type == 'branch'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kuhari:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kuhari:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kuhari:cache,mode=max
      - name: Build and push image (tag)
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kuhari:latest
            ghcr.io/${{ github.repository_owner }}/kuhari:${{ github.ref_name }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kuhari:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kuhari:cache,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy update
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: ${{ secrets.DEPLOY_PATH }}/update.sh
